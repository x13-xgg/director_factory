name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: director
          POSTGRES_PASSWORD: director
          POSTGRES_DB: director_factory
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U director -d director_factory"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg

      - name: Install Python dependencies
        run: |
          uv pip install --system -e ".[dev]"
          uv pip install --system pytest pytest-asyncio pytest-cov

      - name: Verify ffmpeg
        run: ffmpeg -version

      - name: Run tests
        env:
          DIRECTOR_MODE: development
          MOCK_ALL: "true"
          TTS_PROVIDER: mock
          IMG_PROVIDER: mock
          MSG_BACKEND: memory
          DATABASE_BACKEND: memory
          DATABASE_URL: postgresql://director:director@localhost:5432/director_factory
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m pytest tests/ -v --asyncio-mode=auto --cov=src --cov-report=xml --cov-report=term

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: unittests

  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv pip install --system -e ".[dev]"

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: director-factory:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify image
        run: |
          docker images director-factory:ci
          docker run --rm director-factory:ci python -c "from src.core.config import config; print(f'Config OK: mode={config.mode}')"
